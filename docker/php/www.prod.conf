; PHP-FPM pool — surchargement du pool [www] pour la production.
;
; QUOI    : Tuning du pool (workers, statut, ping pour healthcheck).
; POURQUOI: Exposer /ping pour Docker HEALTHCHECK et /status pour métriques internes.

[www]
user = www-data
group = www-data
listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Endpoints internes (jamais exposés via le reverse-proxy).
ping.path = /ping
ping.response = pong
pm.status_path = /fpm-status

clear_env = no
catch_workers_output = yes
decorate_workers_output = no

; Logs envoyés à stdout/stderr du conteneur (lus par `docker logs`).
access.log = /proc/self/fd/2
