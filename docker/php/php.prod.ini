; Configuration PHP — environnement de production
;
; QUOI    : Durcissement (no display_errors), OPcache figé, JIT activé.
; POURQUOI: Performance maximale et zéro fuite d'information côté client.

memory_limit = 512M
post_max_size = 32M
upload_max_filesize = 32M
max_execution_time = 30
date.timezone = Europe/Paris

display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; OPcache : code figé, pas de revalidation (forcer le redémarrage du conteneur sur déploiement).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.preload = /var/www/html/config/preload.php
opcache.preload_user = www-data

; JIT (PHP 8.x) — tracing mode, 100M buffer.
opcache.jit = tracing
opcache.jit_buffer_size = 100M

realpath_cache_size = 4096K
realpath_cache_ttl = 600

apc.enable = 1
apc.enable_cli = 1

expose_php = Off
cgi.fix_pathinfo = 0
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
