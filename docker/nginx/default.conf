# docker/nginx/default.conf
#
# QUOI : Virtual host Nginx pour le dev local (front controller Symfony).
#
# COMMENT : `try_files` vers `index.php` ; seul `index.php` en FastCGI ; cache assets 7 jours.
#
# OÙ : Service `nginx` de `compose.yaml`.
#
# POURQUOI : Séparer le serveur web du conteneur PHP en développement.

server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    client_max_body_size 32M;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        internal;
    }

    # Toute autre URI .php est refusée (sécurité Symfony).
    location ~ \.php$ {
        return 404;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    error_log /var/log/nginx/symfony_error.log;
    access_log /var/log/nginx/symfony_access.log;
}
