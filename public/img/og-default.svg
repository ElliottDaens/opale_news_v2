<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b2f56"/>
      <stop offset="100%" stop-color="#1a6b9e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8743b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle wave shapes -->
  <ellipse cx="1050" cy="580" rx="400" ry="200" fill="#ffffff" fill-opacity="0.04"/>
  <ellipse cx="150" cy="80" rx="300" ry="150" fill="#ffffff" fill-opacity="0.03"/>

  <!-- Accent bar -->
  <rect x="80" y="260" width="6" height="110" rx="3" fill="url(#wave)"/>

  <!-- Site name -->
  <text x="108" y="330" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff" letter-spacing="-1">Opale News</text>

  <!-- Tagline -->
  <text x="108" y="385" font-family="Arial, sans-serif" font-size="30" fill="#b8d4ea" letter-spacing="0.5">L'agenda de la Côte d'Opale</text>

  <!-- Region badge -->
  <rect x="108" y="420" width="330" height="44" rx="22" fill="#e8743b" fill-opacity="0.85"/>
  <text x="273" y="449" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">Pas-de-Calais · Nord</text>

  <!-- Decorative dots -->
  <circle cx="950" cy="200" r="4" fill="#d4af37" fill-opacity="0.6"/>
  <circle cx="980" cy="230" r="2.5" fill="#d4af37" fill-opacity="0.4"/>
  <circle cx="920" cy="240" r="3" fill="#d4af37" fill-opacity="0.5"/>
  <circle cx="1000" cy="180" r="5" fill="#e8743b" fill-opacity="0.4"/>
  <circle cx="1050" cy="210" r="3" fill="#e8743b" fill-opacity="0.3"/>
</svg>
