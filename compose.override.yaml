# compose.override.yaml
#
# QUOI : Surcharges dev — port Postgres dynamique, capture SMTP Mailpit.
#
# COMMENT : Fusionné automatiquement avec `compose.yaml`.
#
# OÙ : Racine du projet, ignoré en prod.
#
# POURQUOI : Éviter les conflits de ports et tester les emails localement.

services:
###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  # Mailpit : SMTP 1025, UI 8025.
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###
