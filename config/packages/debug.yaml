# debug.yaml
#
# QUOI : Active le composant Debug Symfony en développement (VarDumper distant).
#
# COMMENT : `dump_destination` vers `VAR_DUMPER_SERVER` pour `bin/console server:dump`.
#
# OÙ : Profil `when@dev` uniquement.
#
# POURQUOI : Inspecter les structures PHP depuis le navigateur ou la CLI sans `var_dump` brut.

when@dev:
    debug:
        # Forwards VarDumper Data clones to a centralized server allowing to inspect dumps on CLI or in your browser.
        # See the "server:dump" command to start a new server.
        dump_destination: "tcp://%env(VAR_DUMPER_SERVER)%"
