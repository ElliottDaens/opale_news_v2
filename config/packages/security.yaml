# security.yaml
#
# QUOI : Configuration du firewall, du fournisseur d’utilisateurs Doctrine, du formulaire de connexion admin et des règles d’accès.
#
# COMMENT : Hashage auto des mots de passe, `entity` provider sur `User::email`, pare-feu `dev` ouvert pour profiler/WDT, `main` avec form_login, logout et remember_me ; `access_control` restreint `/admin` aux admins ; allègement des hashers en test.
#
# OÙ : Bundle Security, lu à chaque requête pour l’authentification et l’autorisation.
#
# POURQUOI : Protéger l’espace d’administration tout en gardant une DX correcte (profiler en dev, tests rapides avec hashers faibles).

security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_users
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: /admin
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 1209600
                path: /
                secure: true
                samesite: lax

    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
