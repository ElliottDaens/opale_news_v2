# routes/web_profiler.yaml
#
# QUOI : Routes du Web Debug Toolbar et du profiler Symfony (`/_wdt`, `/_profiler`).
#
# COMMENT : Chargées uniquement en `dev` (et `test` si dupliqué).
#
# OÙ : Complète `config/packages/web_profiler.yaml`.
#
# POURQUOI : Exposer l’UI de diagnostic sans l’activer en production.

when@dev:
    web_profiler_wdt:
        resource: '@WebProfilerBundle/Resources/config/routing/wdt.php'
        prefix: /_wdt

    web_profiler_profiler:
        resource: '@WebProfilerBundle/Resources/config/routing/profiler.php'
        prefix: /_profiler
