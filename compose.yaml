# compose.yaml
#
# QUOI : Stack de développement local — PHP-FPM, Nginx, PostgreSQL.
#
# COMMENT : Fusionne `compose.override.yaml` (Mailpit, ports DB) ; volumes `vendor` et `var` nommés.
#
# OÙ : `docker compose up` à la racine ; pas utilisé en production (`compose.prod.yaml`).
#
# POURQUOI : Environnement reproductible sans installer PHP/Postgres sur l’hôte.

services:
  # Application Symfony — cible Docker `dev`.
  php:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8"
    volumes:
      - ./:/var/www/html:rw
      - php_var:/var/www/html/var
      - php_vendor:/var/www/html/vendor

  # Reverse proxy HTTP vers PHP-FPM.
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

###> doctrine/doctrine-bundle ###
  # PostgreSQL persistant (`database_data`).
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
  php_var:
  php_vendor:
